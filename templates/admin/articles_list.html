{% extends 'base.html' %}
{% block content %}
<section class="section-heading admin-heading">
    <h1>Управление материалами</h1>
    <a class="btn" href="{{ url_for('admin_articles_create') }}">Добавить материал</a>
</section>
<div class="table-wrap">
    <table>
        <thead>
        <tr>
            <th>Категория</th>
            <th>Заголовок</th>
            <th>Краткое описание</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        {% for item in items %}
            <tr>
                <td>{{ item.category }}</td>
                <td>{{ item.title }}</td>
                <td>{{ item.summary }}</td>
                <td class="actions">
                    <a href="{{ url_for('admin_articles_edit', item_id=item.id) }}">Редактировать</a>
                    <form method="post" action="{{ url_for('admin_articles_delete', item_id=item.id) }}" onsubmit="return confirm('Удалить материал?');">
                        <button type="submit" class="link-button">Удалить</button>
                    </form>
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
