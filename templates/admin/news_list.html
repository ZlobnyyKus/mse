{% extends 'base.html' %}
{% block content %}
<section class="section-heading admin-heading">
    <h1>Управление новостями</h1>
    <a class="btn" href="{{ url_for('admin_news_create') }}">Добавить новость</a>
</section>
<div class="table-wrap">
    <table>
        <thead>
        <tr>
            <th>Дата</th>
            <th>Заголовок</th>
            <th>Краткое описание</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        {% for item in items %}
            <tr>
                <td>{{ item.created_at[:10] }}</td>
                <td>{{ item.title }}</td>
                <td>{{ item.summary }}</td>
                <td class="actions">
                    <a href="{{ url_for('admin_news_edit', item_id=item.id) }}">Редактировать</a>
                    <form method="post" action="{{ url_for('admin_news_delete', item_id=item.id) }}" onsubmit="return confirm('Удалить новость?');">
                        <button type="submit" class="link-button">Удалить</button>
                    </form>
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
